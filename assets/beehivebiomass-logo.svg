<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 964">
<!--
  Beehive mandala logo. Single-path vector, transparent background.

  Provenance: traced (potrace) from the founder-supplied raster "green BN logo.jpg"
  (240x241, lossy JPEG), 4x-upscaled before tracing, then optimised (svgo, integer
  precision in a 960 viewBox = sub-0.3px at display size). It is a faithful trace,
  NOT the original vector geometry.

  Colour: #A5CD3E — the exact sampled brand green. This is deliberately NOT the
  bnr-design --biomass token (#86CC72); the mark is a warmer lime and its colour is
  part of the identity, so it is not tokenised. To recolour, change the path fill
  (or set fill="currentColor" for monochrome contexts).

  Fidelity: the outer rings are faithful. The centre is trace-approximate — the
  source packs tiny petals into a bright point that a 240px JPEG does not resolve,
  so the very centre reads as a small dark cluster rather than a bright dot. This is
  invisible at favicon/logo sizes and visible only when enlarged past a few hundred
  px. For a definitive master, re-trace from a vector or high-resolution export.
-->
